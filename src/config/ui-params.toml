# UI parameter config — labels, tooltips, and input ranges for the form.
# Keyed by dotted paths into the wasm `Parameters` schema. Min/max/step
# values mirror the reference React UI (.references/dynode-web/src/).
#
# Default values here are informational/mirror-only. The runtime default
# comes from `get_default_parameters()` (which loads model/default-params.toml).

# ---- SCENARIO ---------------------------------------------------------------

# Synthetic: duration passed to SEIRModelUnified.run(days); not part of Parameters.
[scenario.days]
label = "Days"
min = 1
max = 400
step = 10
default = 200
type = "integer"
slider = true

[scenario.population]
label = "Population size"
tooltip = "The total number of people in the simulation"
min = 0
step = 1_000_000
default = 330_000_000
type = "integer"

[scenario.initial_infections]
label = "Initial infections"
tooltip = "Number of people infected at the first day of the outbreak"
min = 0
step = 100
default = 1000
type = "float"

[scenario.fraction_initial_immune]
label = "Prior immunity (%)"
tooltip = "Proportion of the population that is immune (i.e., cannot be infected during the outbreak) at the start of the simulation"
min = 0
max = 1
step = 0.01
default = 0.0
type = "percent"
slider = true

[scenario.r0]
label = "Basic reproduction number"
tooltip = "Average number of people infected by a single infectious person."
min = 1.0
max = 2.0
step = 0.1
default = 1.5
type = "float"
slider = true

[scenario.latent_period]
label = "Latent period"
tooltip = "Mean delay from time of exposure to onset of infectiousness, in days"
min = 0.5
max = 2.5
step = 0.1
default = 1.0
type = "float"
slider = true

[scenario.infectious_period]
label = "Infectious period"
tooltip = "Mean duration of infectious period, in days"
min = 1
max = 4.5
step = 0.1
default = 2.5
type = "float"
slider = true

[scenario.fraction_symptomatic]
label = "Symptomatic fraction"
tooltip = "Proportion of infections that would result in symptoms in the absence of mitigations"
min = 0.3
max = 0.8
step = 0.01
default = 0.5
type = "percent"
slider = true
per_group = true

[scenario.fraction_hospitalized]
label = "Infection-hospitalization ratio"
tooltip = "Proportion of infections that would result in hospitalization in the absence of mitigations"
min = 0.0
max = 0.1
step = 0.01
type = "float"
per_group = true

[scenario.fraction_dead]
label = "Infection-fatality ratio"
tooltip = "Proportion of infections that would result in death in the absence of mitigations"
min = 0.0
max = 0.2
step = 0.005
type = "float"
per_group = true

# ---- VACCINE ---------------------------------------------------------------

[mitigations.vaccine.doses]
label = "Vaccine type"
type = "select"
options = [{ value = 1, label = "One dose" }, { value = 2, label = "Two doses" }]

[mitigations.vaccine.start]
label = "Vaccination start"
tooltip = "Start day of the vaccination campaign"
min = 0
max = 200                  # clamped to days at runtime
step = 1
default = 50
type = "integer"
slider = true

[mitigations.vaccine.doses_available]
label = "Vaccine doses available"
tooltip = "Total number of doses available for vaccination. Determines the duration of the vaccine campaign."
min = 0
step = 1_000_000
default = 40_000_000
type = "integer"
slider = true

[mitigations.vaccine.administration_rate]
label = "Vaccine administration rate"
tooltip = "Maximum possible number of doses administered per day"
min = 0
max = 30_000_000
step = 1_000_000
default = 1_500_000
type = "integer"
slider = true

[mitigations.vaccine.dose2_delay]
label = "Delay between doses"
tooltip = "Time that a person must wait before receiving their second dose, in days"
min = 0
max = 200                  # clamped to days at runtime
step = 1
default = 30
type = "integer"
slider = true

[mitigations.vaccine.p_get_2_doses]
label = "Fraction of vaccinees who receive 2 doses"
tooltip = "Of people who receive a first dose, the proportion that also receive a second dose"
min = 0
max = 1
step = 0.01
default = 0.9
type = "percent"
slider = true

[mitigations.vaccine.ve_s]
label = "Effectiveness for susceptibility"
tooltip = "Proportion of potential infections among the vaccine-protected that are averted"
min = 0
max = 1
step = 0.01
default = 0.40
type = "percent"
slider = true

[mitigations.vaccine.ve_i]
label = "Effectiveness for onward transmission"
tooltip = "Proportion of onward transmissions among the vaccine-protected that are averted"
min = 0
max = 1
step = 0.01
default = 0.0
type = "percent"
slider = true

[mitigations.vaccine.ve_p]
label = "Effectiveness for symptomatic disease"
tooltip = "Proportion of symptomatic disease among the vaccine-protected that is averted"
min = 0
max = 1
step = 0.01
default = 0.5
type = "percent"
slider = true

[mitigations.vaccine.ve_2s]
label = "Effectiveness for susceptibility (2nd dose)"
min = 0
max = 1
step = 0.01
default = 0.60
type = "percent"
slider = true

[mitigations.vaccine.ve_2i]
label = "Effectiveness for onward transmission (2nd dose)"
min = 0
max = 1
step = 0.01
default = 0.0
type = "percent"
slider = true

[mitigations.vaccine.ve_2p]
label = "Effectiveness for symptomatic disease (2nd dose)"
min = 0
max = 1
step = 0.01
default = 0.75
type = "percent"
slider = true

[mitigations.vaccine.ramp_up]
label = "Delay from dose to protection (days)"
tooltip = "Time from vaccination to achieving protection from vaccination. Individuals infected before the delay is complete have no protection from vaccination."
min = 0
max = 30
step = 1
default = 14
type = "integer"
slider = true

# ---- ANTIVIRALS ------------------------------------------------------------

[mitigations.antivirals.ave_i]
label = "Effectiveness for onward transmission"
tooltip = "Proportional reduction in onward transmission among infected individuals who receive outpatient antivirals and adhere to the regimen"
min = 0
max = 1
step = 0.01
default = 0.30
type = "percent"
slider = true

[mitigations.antivirals.ave_p_hosp]
