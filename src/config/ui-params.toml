tooltip = "Of symptomatic infections who receive outpatient antivirals and adhere to the regimen, the proportion that avert hospitalization"
min = 0
max = 1
step = 0.01
default = 0.20
type = "percent"
slider = true

[mitigations.antivirals.ave_p_death]
label = "Effectiveness for death"
tooltip = "Of hospitalized infections that receive inpatient antivirals, the proportion that avert death"
min = 0
max = 1
step = 0.01
default = 0.10
type = "percent"
slider = true

[mitigations.antivirals.fraction_seek_care]
label = "Fraction of cases that seek care"
tooltip = "Proportion of symptomatic infections that seek care"
min = 0
max = 1
step = 0.01
default = 0.50
type = "percent"
slider = true

[mitigations.antivirals.fraction_diagnosed_prescribed_outpatient]
label = "Fraction of care-seeking outpatient cases that receive antivirals"
tooltip = "Proportion of care-seeking infections that are prescribed outpatient antivirals"
min = 0
max = 1
step = 0.01
default = 0.40
type = "percent"
slider = true

[mitigations.antivirals.fraction_adhere]
label = "Fraction of individuals that adhere to prescribed outpatient antiviral regimen"
tooltip = "Proportion of individuals prescribed outpatient antivirals who take their full course of medication"
min = 0
max = 1
step = 0.01
default = 0.50
type = "percent"
slider = true

[mitigations.antivirals.fraction_diagnosed_prescribed_inpatient]
label = "Fraction of hospitalized cases that receive antivirals"
tooltip = "Proportion of hospitalized infections that are prescribed inpatient antivirals"
min = 0
max = 1
step = 0.01
default = 1.0
type = "percent"
slider = true

# ---- COMMUNITY -------------------------------------------------------------

[mitigations.community.start]
label = "Start day"
tooltip = "First day that the intervention has its effect"
min = 0
max = 200                  # clamped to days at runtime
step = 1
default = 60
type = "integer"
slider = true

[mitigations.community.duration]
label = "Duration (days)"
tooltip = "Time over which the intervention has its effect"
min = 1
max = 140                  # clamped to days-start at runtime
step = 1
default = 20
type = "integer"
slider = true

[mitigations.community.effectiveness]
label = "Effectiveness"
tooltip = "Proportional reduction in transmission due to the mitigation, where negative values mean an increase in transmission. Effects are symmetric (e.g., child-to-adult and adult-to-child are changed equally)."
min = -1
max = 1
step = 0.1
type = "float"
matrix = true

# ---- TTIQ ------------------------------------------------------------------

[mitigations.ttiq.p_id_infectious]
label = "Probability an infectious person becomes aware of their own infection"
min = 0
max = 1
step = 0.01
default = 0.15
type = "percent"
slider = true

[mitigations.ttiq.p_infectious_isolates]
label = "Probability of isolation"
tooltip = "Probability an aware, infectious person will isolate"
min = 0
max = 1
step = 0.01
default = 0.75
type = "percent"
slider = true

[mitigations.ttiq.isolation_reduction]
label = "Isolation effectiveness"
tooltip = "Proportional reduction in duration of infectious period due to isolation"
min = 0
max = 1
step = 0.01
default = 0.50
type = "percent"
slider = true

[mitigations.ttiq.p_contact_trace]
label = "Probability of contact tracing"
tooltip = "Probability contact tracing will identify an exposed person"
min = 0
max = 1
step = 0.01
default = 0.25
type = "percent"
slider = true

[mitigations.ttiq.p_traced_quarantines]
label = "Contact tracing effectiveness"
tooltip = "Probability a traced contact will quarantine and never transmit"
min = 0
max = 1
step = 0.01
default = 0.75
type = "percent"
slider = true
