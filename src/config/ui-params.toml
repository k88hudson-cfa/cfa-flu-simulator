# UI parameter config — labels, tooltips, and input ranges for the form.
# Keyed by the flat `Parameters` field names (e.g. `vaccine_ve_s`).
#
# Default values here are informational/mirror-only. The runtime default
# comes from `get_default_parameters()` (which loads model/default-params.toml).
#
# Every entry MUST declare `section = "<id>"` — this drives both the sidebar
# grouping and the PDF report's Parameters section. Valid ids: "scenario",
# "detection", "vaccine", "antivirals", "community", "ttiq". Adding a field
# here automatically adds it to the PDF export; no other edits required.
# For fields only shown when the vaccine is 2-dose, set `show_when_doses_2 = true`.

# ---- SCENARIO ---------------------------------------------------------------

[days]
section = "scenario"
label = "Days"
min = 1
max = 400
step = 10
default = 200
type = "integer"
slider = true

[population]
section = "scenario"
label = "Population size"
tooltip = "The total number of people in the simulation"
min = 1
step = 1_000_000
default = 330_000_000
type = "integer"

[initial_infections]
section = "scenario"
label = "Initial infections"
tooltip = "Number of people infected at the first day of the outbreak"
min = 0
step = 100
default = 1000
type = "float"

[fraction_initial_immune]
section = "scenario"
label = "Prior immunity (%)"
tooltip = "Proportion of the population that is immune (i.e., cannot be infected during the outbreak) at the start of the simulation"
min = 0
max = 1
step = 0.01
default = 0.0
type = "percent"
slider = true

[r0]
section = "scenario"
label = "Basic reproduction number"
tooltip = "Average number of people infected by a single infectious person."
min = 1.0
max = 2.0
step = 0.1
default = 1.5
type = "float"
slider = true

[latent_period]
section = "scenario"
label = "Latent period"
tooltip = "Mean delay from time of exposure to onset of infectiousness, in days"
min = 0.5
max = 2.5
step = 0.1
default = 1.0
type = "float"
slider = true

[infectious_period]
section = "scenario"
label = "Infectious period"
tooltip = "Mean duration of infectious period, in days"
min = 1
max = 4.5
step = 0.1
default = 2.5
type = "float"
slider = true

[fraction_symptomatic]
section = "scenario"
label = "Symptomatic fraction"
tooltip = "Proportion of infections that would result in symptoms in the absence of mitigations"
min = 0.3
max = 0.8
step = 0.01
default = 0.5
type = "percent"
slider = true
per_group = true

[fraction_hospitalized]
section = "scenario"
label = "Infection-hospitalization ratio"
tooltip = "Proportion of infections that would result in hospitalization in the absence of mitigations"
min = 0.0
max = 0.1
step = 0.01
type = "float"
per_group = true

[fraction_dead]
section = "scenario"
label = "Infection-fatality ratio"
tooltip = "Proportion of infections that would result in death in the absence of mitigations"
min = 0.0
max = 0.2
step = 0.005
type = "float"
per_group = true

# ---- DETECTION -------------------------------------------------------------

[p_test_sympto]
section = "detection"
label = "Proportion of symptomatic infections tested (%)"
min = 0
max = 25
step = 0.1
default = 0.1
type = "float"
slider = true

[test_sensitivity]
section = "detection"
label = "Test sensitivity"
tooltip = "Proportion of tested infections that are correctly identified as infected by the test"
min = 0.6
max = 1.0
step = 0.01
default = 0.90
type = "percent"
slider = true

[p_test_forward]
section = "detection"
label = "Probability a positive test is forwarded to public health"
tooltip = "Proportion of positive tests that are forwarded to a public health laboratory, resulting in a detection"
min = 0
max = 1.0
step = 0.01
default = 0.90
type = "percent"
slider = true

# ---- VACCINE ---------------------------------------------------------------

[vaccine_doses]
section = "vaccine"
label = "Vaccine type"
type = "select"
options = [{ value = 1, label = "One dose" }, { value = 2, label = "Two doses" }]

[vaccine_start]
section = "vaccine"
label = "Vaccination start"
tooltip = "Start day of the vaccination campaign"
min = 0
max = 200                  # clamped to days at runtime
step = 1
default = 50
type = "integer"
slider = true

[vaccine_doses_available]
section = "vaccine"
label = "Vaccine doses available"
tooltip = "Total number of doses available for vaccination. Determines the duration of the vaccine campaign."
min = 0
step = 1_000_000
default = 40_000_000
type = "integer"
slider = true

[vaccine_administration_rate]
